                }
                headTr.appendChild(th);
              });
              thead.appendChild(headTr);
              table.appendChild(thead);
              table.appendChild(tbody);

              table.addEventListener('dblclick', onTableDblClick);
              if (typeof isTouch !== 'undefined' && isTouch) {
  attachLongPressEdit(table);
}

              table.addEventListener('blur', onTableBlur, true);

              wrapper.appendChild(table);
              tablesWrapper.appendChild(wrapper);
            }

            let priceNum = NaN;
            let coeffNum = NaN;
            if (priceColIndex != null && priceColIndex >= 0) priceNum = parseNumber(row[priceColIndex]);
            if (coeffColIndex != null && coeffColIndex >= 0) coeffNum = parseNumber(row[coeffColIndex]);
            const qty = qtyColIndex != null && qtyColIndex >= 0 ? parseNumber(row[qtyColIndex]) : NaN;

            const effectivePrice = !Number.isNaN(priceNum) && priceNum !== 0
              ? priceNum
              : (!Number.isNaN(coeffNum) && coeffNum !== 0 ? coeffNum : NaN);

            const commissionRaw = colCommissionIndex != null && colCommissionIndex >= 0 ? parseNumber(row[colCommissionIndex]) : NaN;
            const commissionTotal = Number.isNaN(commissionRaw) ? 0 : commissionRaw;

            let costForRowNoCommission = '';
            let saleAmountForRowNoCommission = '';
            let profitForRowNoCommission = '';
            let costForRowWithCommission = '';
            let saleAmountForRowWithCommission = '';
            let profitForRowWithCommission = '';

            if (!Number.isNaN(qty) && qty !== 0) {
              const baseUnitPrice = Number.isNaN(effectivePrice) ? 0 : effectivePrice;

              if (qty > 0) {
                const commissionPerUnit = qty !== 0 ? commissionTotal / qty : 0;
                const unitPriceNoCommission = baseUnitPrice;
                const unitPriceWithCommission = baseUnitPrice + commissionPerUnit;
                const lotCostNoCommission = qty * unitPriceNoCommission;
                const lotCostWithCommission = qty * unitPriceWithCommission;

                fifoLotsNoCommission.push({ qty, price: unitPriceNoCommission });
                fifoLotsWithCommission.push({ qty, price: unitPriceWithCommission });
                runningQty += qty;
                runningCostNoCommission += lotCostNoCommission;
                runningCostWithCommission += lotCostWithCommission;

                costForRowNoCommission = lotCostNoCommission ? formatNumberComma(lotCostNoCommission) : '';
                costForRowWithCommission = lotCostWithCommission ? formatNumberComma(lotCostWithCommission) : '';
              } else {
                let sellQtyNoCommission = Math.abs(qty);
                let sellQtyWithCommission = Math.abs(qty);
                let costNoCommission = 0;
                let costWithCommission = 0;

                while (sellQtyNoCommission > 0 && fifoLotsNoCommission.length > 0) {
                  const lot = fifoLotsNoCommission[0];
                  const take = Math.min(sellQtyNoCommission, lot.qty);
                  costNoCommission += take * lot.price;
                  lot.qty -= take;
                  sellQtyNoCommission -= take;
                  if (lot.qty === 0) fifoLotsNoCommission.shift();
                }

                while (sellQtyWithCommission > 0 && fifoLotsWithCommission.length > 0) {
                  const lot = fifoLotsWithCommission[0];
                  const take = Math.min(sellQtyWithCommission, lot.qty);
                  costWithCommission += take * lot.price;
                  lot.qty -= take;
                  sellQtyWithCommission -= take;
                  if (lot.qty === 0) fifoLotsWithCommission.shift();
                }

                runningQty += qty;
                if (runningQty < 0) runningQty = 0;
                runningCostNoCommission -= costNoCommission;
                runningCostWithCommission -= costWithCommission;
                if (runningCostNoCommission < 0) runningCostNoCommission = 0;
                if (runningCostWithCommission < 0) runningCostWithCommission = 0;

                const grossSaleAmount = Math.abs(qty) * baseUnitPrice;
                const saleAmountNoCommission = grossSaleAmount;
                const saleAmountWithCommission = grossSaleAmount - commissionTotal;
                const profitNoCommission = saleAmountNoCommission - costNoCommission;
                const profitWithCommission = saleAmountWithCommission - costWithCommission;

                costForRowNoCommission = costNoCommission ? formatNumberComma(costNoCommission) : '';
                saleAmountForRowNoCommission = saleAmountNoCommission ? formatNumberComma(saleAmountNoCommission) : '';
                profitForRowNoCommission = (saleAmountNoCommission || costNoCommission) ? formatNumberComma(profitNoCommission) : '';
                costForRowWithCommission = costWithCommission ? formatNumberComma(costWithCommission) : '';
                saleAmountForRowWithCommission = saleAmountWithCommission ? formatNumberComma(saleAmountWithCommission) : '';
                profitForRowWithCommission = (saleAmountWithCommission || costWithCommission) ? formatNumberComma(profitWithCommission) : '';
              }

              const balanceQty = runningQty;
              const avgCostNoCommission = balanceQty > 0 ? runningCostNoCommission / balanceQty : 0;
              const avgCostWithCommission = balanceQty > 0 ? runningCostWithCommission / balanceQty : 0;

              row[colBalanceQtyIndex] = balanceQty.toString();
              row[colBalanceCostIndex] = runningCostNoCommission ? formatNumberComma(runningCostNoCommission) : '';
              row[colAvgCostIndex] = balanceQty > 0 ? formatNumberComma(avgCostNoCommission) : '';
              row[colBalanceCostWithCommissionIndex] = runningCostWithCommission ? formatNumberComma(runningCostWithCommission) : '';
              row[colAvgCostWithCommissionIndex] = balanceQty > 0 ? formatNumberComma(avgCostWithCommission) : '';
            }

            row[colCostIndex] = costForRowNoCommission;
            row[colSaleAmountIndex] = saleAmountForRowNoCommission;
            row[colProfitIndex] = profitForRowNoCommission;
            row[colCostWithCommissionIndex] = costForRowWithCommission;
            row[colSaleAmountWithCommissionIndex] = saleAmountForRowWithCommission;
            row[colProfitWithCommissionIndex] = profitForRowWithCommission;

            const tr = document.createElement('tr');
            row.forEach((cell, colIndex) => {
              // !!! SKIP RENDERING PROFIT KZT COLUMN IN MAIN VIEW !!!
              if (colIndex === profitKztColIndex) return;

              const td = document.createElement('td');
              td.textContent        = cell;
              td.dataset.rowIndex = String(globalRowIndex);
              td.dataset.colIndex = String(colIndex);
              
              if (colIndex === colIsinIndex) td.classList.add('cell-isin');
              if (isCalcCol(colIndex))       td.classList.add('calc-col');
              if (isCommissionCalcCol(colIndex)) td.classList.add('commission-col');
              
              if (colIndex === colNameIndex) {
                td.classList.add('cell-edit-name');
                td.title = 'Двойной клик для изменения наименования';
              } else if (groupHasMultipleTickers && colIndex === colNameIndex) {
                 td.classList.add('market-highlight');
              }

              // !! Logic for new column editing (now visible)
              if (colIndex === colProfitKztIndex) {
          // Эквивалент в тенге рассчитывается автоматически по курсу на дату операции (после интеграции с API).
          // Ручной ввод отключён.
          td.classList.add('cell-readonly');
          td.title = 'Эквивалент в тенге рассчитывается автоматически по курсу на дату операции (будет доступно после интеграции с API курса валют).';
        }

              // !!! Редактируемые поля ПЕРЕВОДА !!!
              if ((colTransferFromIndex != null && colIndex === colTransferFromIndex) || 
                  (colTransferToIndex != null && colIndex === colTransferToIndex)) {
                  td.classList.add('cell-edit-transfer');
                  td.title = 'Двойной клик для редактирования перевода';
              }

              // CHECK FOR EDITED STATUS
              const cellKey = `${globalRowIndex}-${colIndex}`;
              const editStatus = editedCells.get(cellKey);

              if (priceColIndex != null &&
                  coeffColIndex != null &&
                  priceColIndex >= 0 &&
                  coeffColIndex >= 0) {
                
                // --- Logic for highlighting red/yellow/edited ---
                if (priceNum === 0 && coeffNum === 0 && colIndex === priceColIndex) {
                  td.classList.add('cell-edit-red');
                  td.title = 'Двойной клик для редактирования цены';
                  groupHasRed = true;
                } 
                else if (priceNum === 0 && coeffNum === 1 && colIndex === coeffColIndex) {
                  td.classList.add('cell-edit-yellow');
                  td.title = 'Двойной клик для редактирования коэффициента';
                  groupHasYellow = true;
                }
                else if (editStatus === 'red') {
                    td.classList.add('cell-edited-red');
                    groupHasEditedRed = true;
                }
                else if (editStatus === 'yellow') {
                    td.classList.add('cell-edited-yellow');
                    groupHasEditedYellow = true;
                }
              }

              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });

          if (table) finalizeGroup();
          
          setTimeout(initScrollSpy, 100);
        }

        function recomputeFifoInLastData() {

          if (!data || data.length <= 1) return;
          if (colQtyIndex == null || colPriceIndex == null || colCoeffIndex == null) return;

          const rows = data.slice(1);
          let currentIsin = null;
          let fifoStateByTicker = {};

          function getTickerState(tickerVal) {
            const key = tickerVal || '__NO_TICKER__';

              fifoStateByTicker[key] = {
                fifoLotsNoCommission: [],
                fifoLotsWithCommission: [],
                runningQty: 0,
                runningCostNoCommission: 0,
                runningCostWithCommission: 0
              };

            return fifoStateByTicker[key];

              currentIsin = isinVal;

              tickerVal = extractTickerFromName(row[colNameIndex]);

            let fifoLotsNoCommission = state.fifoLotsNoCommission;
            let fifoLotsWithCommission = state.fifoLotsWithCommission;
            let runningQty = state.runningQty;
            let runningCostNoCommission = state.runningCostNoCommission;
            let runningCostWithCommission = state.runningCostWithCommission;

            const priceNum = parseNumber(row[colPriceIndex]);
            const coeffNum = parseNumber(row[colCoeffIndex]);
            const qty = parseNumber(row[colQtyIndex]);
            const commissionRaw = colCommissionIndex != null && colCommissionIndex >= 0 ? parseNumber(row[colCommissionIndex]) : NaN;
            const commissionTotal = Number.isNaN(commissionRaw) ? 0 : commissionRaw;

            const effectivePrice = !Number.isNaN(priceNum) && priceNum !== 0
              ? priceNum
              : (!Number.isNaN(coeffNum) && coeffNum !== 0 ? coeffNum : NaN);

            let costForRowNoCommission = '';
            let saleAmountForRowNoCommission = '';
            let profitForRowNoCommission = '';
            let costForRowWithCommission = '';
            let saleAmountForRowWithCommission = '';
            let profitForRowWithCommission = '';

            if (!Number.isNaN(qty) && qty !== 0) {
              const baseUnitPrice = Number.isNaN(effectivePrice) ? 0 : effectivePrice;

              if (qty > 0) {
                const commissionPerUnit = qty !== 0 ? commissionTotal / qty : 0;
                const unitPriceNoCommission = baseUnitPrice;
                const unitPriceWithCommission = baseUnitPrice + commissionPerUnit;
                const lotCostNoCommission = qty * unitPriceNoCommission;
                const lotCostWithCommission = qty * unitPriceWithCommission;

                fifoLotsNoCommission.push({ qty, price: unitPriceNoCommission });
                fifoLotsWithCommission.push({ qty, price: unitPriceWithCommission });
                runningQty += qty;
                runningCostNoCommission += lotCostNoCommission;
                runningCostWithCommission += lotCostWithCommission;

                costForRowNoCommission = lotCostNoCommission ? formatNumberComma(lotCostNoCommission) : '';
                costForRowWithCommission = lotCostWithCommission ? formatNumberComma(lotCostWithCommission) : '';
              } else {
                let sellQtyNoCommission = Math.abs(qty);
                let sellQtyWithCommission = Math.abs(qty);
                let costNoCommission = 0;
                let costWithCommission = 0;

                while (sellQtyNoCommission > 0 && fifoLotsNoCommission.length > 0) {
                  const lot = fifoLotsNoCommission[0];
                  const take = Math.min(sellQtyNoCommission, lot.qty);
                  costNoCommission += take * lot.price;
                  lot.qty -= take;
                  sellQtyNoCommission -= take;
                  if (lot.qty === 0) fifoLotsNoCommission.shift();
                }

                while (sellQtyWithCommission > 0 && fifoLotsWithCommission.length > 0) {
                  const lot = fifoLotsWithCommission[0];
                  const take = Math.min(sellQtyWithCommission, lot.qty);
                  costWithCommission += take * lot.price;
                  lot.qty -= take;
                  sellQtyWithCommission -= take;
                  if (lot.qty === 0) fifoLotsWithCommission.shift();
                }

                runningQty += qty;
                if (runningQty < 0) runningQty = 0;
                runningCostNoCommission -= costNoCommission;
                runningCostWithCommission -= costWithCommission;
                if (runningCostNoCommission < 0) runningCostNoCommission = 0;
                if (runningCostWithCommission < 0) runningCostWithCommission = 0;

                const grossSaleAmount = Math.abs(qty) * baseUnitPrice;
                const saleAmountNoCommission = grossSaleAmount;
                const saleAmountWithCommission = grossSaleAmount - commissionTotal;
                const profitNoCommission = saleAmountNoCommission - costNoCommission;
                const profitWithCommission = saleAmountWithCommission - costWithCommission;

                costForRowNoCommission = costNoCommission ? formatNumberComma(costNoCommission) : '';
                saleAmountForRowNoCommission = saleAmountNoCommission ? formatNumberComma(saleAmountNoCommission) : '';
                profitForRowNoCommission = (saleAmountNoCommission || costNoCommission) ? formatNumberComma(profitNoCommission) : '';
                costForRowWithCommission = costWithCommission ? formatNumberComma(costWithCommission) : '';
                saleAmountForRowWithCommission = saleAmountWithCommission ? formatNumberComma(saleAmountWithCommission) : '';
                profitForRowWithCommission = (saleAmountWithCommission || costWithCommission) ? formatNumberComma(profitWithCommission) : '';
              }

              const balanceQty = runningQty;
              const avgCostNoCommission = balanceQty > 0 ? runningCostNoCommission / balanceQty : 0;
              const avgCostWithCommission = balanceQty > 0 ? runningCostWithCommission / balanceQty : 0;

              row[colBalanceQtyIndex] = balanceQty.toString();
              row[colBalanceCostIndex] = runningCostNoCommission ? formatNumberComma(runningCostNoCommission) : '';
              row[colAvgCostIndex] = balanceQty > 0 ? formatNumberComma(avgCostNoCommission) : '';
              row[colBalanceCostWithCommissionIndex] = runningCostWithCommission ? formatNumberComma(runningCostWithCommission) : '';
              row[colAvgCostWithCommissionIndex] = balanceQty > 0 ? formatNumberComma(avgCostWithCommission) : '';
            }

            row[colCostIndex] = costForRowNoCommission;
            row[colSaleAmountIndex] = saleAmountForRowNoCommission;
            row[colProfitIndex] = profitForRowNoCommission;
            row[colCostWithCommissionIndex] = costForRowWithCommission;
            row[colSaleAmountWithCommissionIndex] = saleAmountForRowWithCommission;
            row[colProfitWithCommissionIndex] = profitForRowWithCommission;

            state.fifoLotsNoCommission = fifoLotsNoCommission;
            state.fifoLotsWithCommission = fifoLotsWithCommission;
            state.runningQty = runningQty;
            state.runningCostNoCommission = runningCostNoCommission;
            state.runningCostWithCommission = runningCostWithCommission;
          });

      clear();
    }, 450);
  }, { passive: true });

  table.addEventListener('touchmove', () => {
    moved = true;
    clear();
  }, { passive: true });

  table.addEventListener('touchend', clear, { passive: true });
  table.addEventListener('touchcancel', clear, { passive: true });

        function escapeHtml(val) {

        function cloneDataTable(data) {

        function recomputeFifoForReportData(data, includeCommission) {
          if (!data || data.length <= 1) return data;
          if (colQtyIndex == null || colPriceIndex == null || colCoeffIndex == null) return data;

          const rows = data.slice(1);
          let currentIsin = null;
          let fifoStateByTicker = {};

          function getTickerState(tickerVal) {
            const key = tickerVal || '__NO_TICKER__';
            if (!fifoStateByTicker[key]) {
              fifoStateByTicker[key] = { fifoLots: [], runningQty: 0, runningCost: 0 };
            }
            return fifoStateByTicker[key];
          }

          rows.forEach(row => {
            const isinVal =
              colIsinIndex != null && colIsinIndex >= 0 && row[colIsinIndex] !== undefined
                ? String(row[colIsinIndex]).trim()
                : '';

            const needNewGroup = currentIsin === null || (isinVal && isinVal !== currentIsin);
            if (needNewGroup) {
              currentIsin = isinVal;
              fifoStateByTicker = {};
            }

            let tickerVal = '';
            if (colNameIndex != null && colNameIndex >= 0 && row[colNameIndex] !== undefined) {
              tickerVal = extractTickerFromName(row[colNameIndex]);
            }

            const state = getTickerState(tickerVal);
            let fifoLots = state.fifoLots;
            let runningQty = state.runningQty;
            let runningCost = state.runningCost;

            const priceNum = parseNumber(row[colPriceIndex]);
            const coeffNum = parseNumber(row[colCoeffIndex]);
            const qty = parseNumber(row[colQtyIndex]);
            const commissionRaw = colCommissionIndex != null && colCommissionIndex >= 0 ? parseNumber(row[colCommissionIndex]) : NaN;
            const commissionTotal = Number.isNaN(commissionRaw) ? 0 : commissionRaw;

            const effectivePrice = !Number.isNaN(priceNum) && priceNum !== 0
              ? priceNum
              : (!Number.isNaN(coeffNum) && coeffNum !== 0 ? coeffNum : NaN);

            let costForRow = '';
            let saleAmountForRow = '';
            let profitForRow = '';

            if (!Number.isNaN(qty) && qty !== 0) {
              if (qty > 0) {
                const baseUnitPrice = Number.isNaN(effectivePrice) ? 0 : effectivePrice;
                const commissionPerUnit = includeCommission && qty !== 0 ? commissionTotal / qty : 0;
                const unitPrice = baseUnitPrice + commissionPerUnit;
                const lotCost = qty * unitPrice;
                fifoLots.push({ qty, price: unitPrice });
                runningQty += qty;
                runningCost += lotCost;
                costForRow = lotCost ? formatNumberComma(lotCost) : '';
              } else {
                let sellQty = Math.abs(qty);
                let cost = 0;
                while (sellQty > 0 && fifoLots.length > 0) {
                  const lot = fifoLots[0];
                  const take = Math.min(sellQty, lot.qty);
                  cost += take * lot.price;
                  lot.qty -= take;
                  sellQty -= take;
                  if (lot.qty === 0) fifoLots.shift();
                }
                runningQty += qty;
                if (runningQty < 0) runningQty = 0;
                runningCost -= cost;
                if (runningCost < 0) runningCost = 0;

                const unitPrice = Number.isNaN(effectivePrice) ? 0 : effectivePrice;
                const grossSaleAmount = Math.abs(qty) * unitPrice;
                const saleCommission = includeCommission ? commissionTotal : 0;
                const saleAmount = grossSaleAmount - saleCommission;
                const profit = saleAmount - cost;

                costForRow = cost ? formatNumberComma(cost) : '';
                saleAmountForRow = saleAmount ? formatNumberComma(saleAmount) : '';
                profitForRow = (saleAmount || cost) ? formatNumberComma(profit) : '';
              }

              const balanceQty = runningQty;
              const balanceCost = runningCost;
              const avgCost = balanceQty > 0 ? balanceCost / balanceQty : 0;

              row[colBalanceQtyIndex] = balanceQty.toString();
              row[colBalanceCostIndex] = balanceCost ? formatNumberComma(balanceCost) : '';
              row[colAvgCostIndex] = balanceQty > 0 ? formatNumberComma(avgCost) : '';
            }

            row[colCostIndex] = costForRow;
            row[colSaleAmountIndex] = saleAmountForRow;
            row[colProfitIndex] = profitForRow;

            state.fifoLots = fifoLots;
            state.runningQty = runningQty;
            state.runningCost = runningCost;
          });

          return data;
        }

    .logo-mark { width:48px; height:48px; border:5px solid #00856f; border-radius: 16px; transform: rotate(45deg); }
    h1 { margin: 0 0 22px; text-align:center; font-size: 15px; font-weight:700; }
    .report-header { position: relative; margin-bottom: 10px; }
    .export-buttons { position:absolute; right:0; top:0; display:flex; gap:6px; font-family: Arial, sans-serif; }
    .export-buttons button { padding: 5px 10px; font-size: 11px; border:1px solid #777; background:#fff; cursor:pointer; }
    .meta-center { width: 520px; margin: 0 auto 18px; font-size: 11px; }
    .meta-row { display:grid; grid-template-columns: 190px 1fr; gap:8px; line-height: 1.35; }
    .meta-label { text-align:right; font-weight:700; }
    .meta-value { text-align:left; }
    .section { margin-top: 22px; page-break-inside: avoid; }
    .section-title, .summary-title { font-size: 12px; font-weight:700; margin: 0 0 4px 0; text-align:left; }
    .table-wrapper { overflow: visible; }
    table { border-collapse: collapse; width:100%; }
    .data-table, .summary-table { font-size: 10px; table-layout: fixed; }
    .data-table th, .data-table td, .summary-table th, .summary-table td { border:1px solid #000; padding: 4px 5px; text-align:center; vertical-align:middle; word-break: break-word; }
    .data-table th, .summary-table th { font-weight:700; }
    .summary-block { margin-top: 8px; }
    .summary-table td:first-child { text-align:left; font-weight:700; }
    .summary-table .subtotal-row td { font-weight:700; text-align:right; }
    .summary-table .grand-total-row td { font-size: 12px; font-weight:700; }
    .notes { margin-top: 18px; font-size: 11px; line-height: 1.25; }
    .notes-title { font-weight:700; margin-bottom:5px; }
    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      .export-buttons { display:none !important; }
      .report { padding:0; }
      .logo { font-size: 28px; margin-bottom: 14px; }
      .logo-mark { width:42px; height:42px; }
      .data-table, .summary-table { font-size: 9px; }
      .section { page-break-inside: avoid; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"><\/script>
</head>
<body>
  <div class="report">
    <div class="report-header">
      <div class="logo"><span class="logo-mark"></span><span>Halyk<br>Finance</span></div>
      <h1>${escapeHtml(reportTitleFull)}</h1>
      <div class="export-buttons">
        <button type="button" onclick="exportReportToExcel()">Выгрузить Excel</button>
        <button type="button" onclick="exportReportToPdf()">Выгрузить PDF</button>
      </div>
    </div>

    <div class="meta-center">
       <div class="meta-row"><span class="meta-label">ФИО:</span><span class="meta-value">${escapeHtml(clientName)}</span></div>
       <div class="meta-row"><span class="meta-label">ИИН:</span><span class="meta-value"></span></div>
       <div class="meta-row"><span class="meta-label">Брокерский счет:</span><span class="meta-value">${escapeHtml(brokerAccount)}</span></div>
       <div class="meta-row"><span class="meta-label">Отчетный период:</span><span class="meta-value">${escapeHtml(periodText)}</span></div>
       <div class="meta-row"><span class="meta-label">Дата формирования отчета:</span><span class="meta-value">${escapeHtml(formedAt)}</span></div>
    </div>

    ${summaryHtml}
    
    ${cbSectionHtml}

    <div class="section">
      <div class="section-title">Финансовый результат по операциям с финансовыми инструментами</div>
      ${buildTableHtml(headersSales, salesRows)}
    </div>

    <div class="section">
      <div class="section-title">Выплаты по ценным бумагам (дивиденды, купоны)</div>
      ${buildTableHtml(headersDividends, dividendsRows)}
    </div>

    <div class="section">
      <div class="section-title">Финансовый результат по операциям РЕПО</div>
      ${buildTableHtml(headersRepo, repoRows)}
    </div>

    <div class="notes">
      <div class="notes-title">Примечания к отчету</div>
      <div>Настоящий отчет сформирован на основании данных учетных систем Компании и содержит информацию об операциях с финансовыми инструментами за указанный отчетный период.</div>
      <div>${escapeHtml(reportNoteText)}</div>
      <div>Информация, представленная в отчете, носит исключительно информационный характер и не является налоговой декларацией либо официальным налоговым расчетом. Налоговые обязательства определяются самостоятельно в соответствии с законодательством Республики Казахстан.</div>
    </div>
  </div>
  <script>
    const R = ${reportDataJson};

    function exportReportToExcel() {
      if (typeof XLSX === 'undefined') { alert('Библиотека XLSX не загружена.'); return; }
      const wb = XLSX.utils.book_new();

      if (R.exportSummaryData && R.exportSummaryData.length) {
         const wsSummary = XLSX.utils.aoa_to_sheet(R.exportSummaryData);
         wsSummary['!cols'] = [{wch: 40}, {wch: 10}, {wch: 20}, {wch: 25}];
         XLSX.utils.book_append_sheet(wb, wsSummary, 'Сводка');
      }
      if (R.cbHeaderRow && R.cbHeaderRow.length) {
        const cbAoA = [R.cbHeaderRow, ...(R.cbRows || [])];
        const wsCb = XLSX.utils.aoa_to_sheet(cbAoA);
        XLSX.utils.book_append_sheet(wb, wsCb, 'Остатки ЦБ');
      }
      if (R.headersSales && R.headersSales.length) {
        const salesAoA = [R.headersSales, ...(R.salesRows || [])];
        const wsSales = XLSX.utils.aoa_to_sheet(salesAoA);
        XLSX.utils.book_append_sheet(wb, wsSales, 'Прирост стоимости');
      }
      if (R.headersDividends && R.headersDividends.length) {
        const divAoA = [R.headersDividends, ...(R.dividendsRows || [])];
        const wsDiv = XLSX.utils.aoa_to_sheet(divAoA);
        XLSX.utils.book_append_sheet(wb, wsDiv, 'Дивиденды');
      }
      if (R.headersRepo && R.headersRepo.length) {
        const repoAoA = [R.headersRepo, ...(R.repoRows || [])];
        const wsRepo = XLSX.utils.aoa_to_sheet(repoAoA);
        XLSX.utils.book_append_sheet(wb, wsRepo, 'РЕПО');
      }
      const fileNamePrefix = R.scope === 'rk'
        ? 'Фин рез РК '
        : (R.includeCommission ? 'Фин рез все рынки с комиссией ' : 'Фин рез все рынки без комиссии ');
      const fileName = fileNamePrefix + (R.yearText || '') + '.xlsx';
      XLSX.writeFile(wb, fileName);
    }

    function exportReportToPdf() {
      window.print();
    }
  <\/script>
</body>
</html>`;

          reportTitleFull: 'Финансовый результат по операциям c ценными бумагами на рынках РК (KASE и AIX) без комиссии',
          reportNoteText: 'Финансовый результат по операциям реализации финансовых инструментов на рынках РК (KASE и AIX) определяется как разница между стоимостью реализации и стоимостью приобретения без учета брокерской комиссии. При расчете себестоимости реализованных финансовых инструментов применяется метод FIFO (First In, First Out).'
        }));
        if (yearReportCommissionBtn) yearReportCommissionBtn.addEventListener('click', () => openYearReport({
          includeCommission: true,
          reportTitle: 'Финансовый результат по операциям c ценными бумагами на всех рынках (с учетом брокерской комиссии)'
        }));
        if (yearReportNoCommissionBtn) yearReportNoCommissionBtn.addEventListener('click', () => openYearReport({
          includeCommission: false,
          reportTitle: 'Финансовый результат по операциям c ценными бумагами на всех рынках (без учета брокерской комиссии)'
        }));

        switchTab('fi');
        updateButtonsState();
        updateNavStats();
        setSourceMode(null);
        resetMeta();

      })();
    });
</script>
